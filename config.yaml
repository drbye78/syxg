# ----------------------------------------------------------
# SECTION 3: FM ENGINE CONFIGURATION
# ----------------------------------------------------------
# FM-specific settings used when parts are configured to use FM engine

fm:
  # Default algorithm (1-88)
  algorithm: 1
  algorithm_name: "basic"
  
  # Master FM settings
  master_volume: 0.8
  pitch_bend_range: 2
  
  # 8 Operators
  operators:
    op_0:
      enabled: true
      frequency_ratio: 1.0
      detune_cents: 0
      feedback_level: 0
      waveform: "sine"
      envelope:
        levels: [0, 100, 70, 70, 0, 0, 0, 0]
        rates: [10, 30, 0, 50, 0, 0, 0, 0]
      key_scaling_depth: 0
      velocity_sensitivity: 0
      scaling_curve: "linear"
      
    op_1:
      enabled: true
      frequency_ratio: 2.0
      detune_cents: 0
      feedback_level: 0
      waveform: "sine"
      envelope:
        levels: [0, 100, 70, 70, 0, 0, 0, 0]
        rates: [10, 30, 0, 50, 0, 0, 0, 0]
        
    op_2:
      enabled: false
      frequency_ratio: 1.0
      
    op_3:
      enabled: false
      frequency_ratio: 1.0
      
    op_4:
      enabled: false
      frequency_ratio: 1.0
      
    op_5:
      enabled: false
      frequency_ratio: 1.0
      
    op_6:
      enabled: false
      frequency_ratio: 1.0
      
    op_7:
      enabled: false
      frequency_ratio: 1.0
  
  # 3 Global LFOs
  lfos:
    lfo_1:
      enabled: true
      frequency: 1.0
      waveform: "sine"
      depth: 0.5
      phase: 0.0
    lfo_2:
      enabled: true
      frequency: 2.0
      waveform: "sine"
      depth: 0.3
      phase: 0.0
    lfo_3:
      enabled: false
      frequency: 0.5
      waveform: "sine"
      depth: 0.2
      phase: 0.0
  
  # Modulation Matrix
  modulation:
    - source: "lfo1"
      destination: "pitch"
      amount: 0.5
      bipolar: true
    - source: "lfo2"
      destination: "amplitude"
      amount: 0.3
      bipolar: false
    - source: "velocity"
      destination: "amplitude"
      amount: 0.7
      bipolar: false
  
  # Effects sends from FM engine
  effects_sends:
    reverb: 0.3
    chorus: 0.2
    delay: 0.0


# ----------------------------------------------------------
# SECTION 4: EFFECTS CONFIGURATION
# ----------------------------------------------------------

effects:
  # System Reverb
  reverb:
    enabled: true
    type: 4          # XG reverb type (0-127)
    time: 2.5         # Reverb time in seconds
    level: 0.8        # Wet/dry mix (0-1)
    hf_damping: 0.3   # High frequency damping (0-1)
  
  # System Chorus
  chorus:
    enabled: true
    type: 1           # XG chorus type (0-7)
    rate: 0.5         # Rate in Hz
    depth: 0.6        # Depth (0-1)
    feedback: 0.5     # Feedback (0-1)
  
  # System Variation (multi-effect)
  variation:
    enabled: true
    type: 12          # Effect type (0-127)
    parameters:
      delay_time: 300    # Delay time in ms
      feedback: 0.4      # Feedback amount
      level: 0.5         # Wet/dry mix
  
  # Master EQ
  eq:
    enabled: false
    low_gain: 0.0      # dB
    low_frequency: 100  # Hz
    mid_gain: 0.0      # dB
    mid_frequency: 1000 # Hz
    mid_q: 1.0
    high_gain: 0.0     # dB
    high_frequency: 8000 # Hz
  
  # Master Compressor
  compressor:
    enabled: false
    threshold: -20.0   # dB
    ratio: 4.0         # Compression ratio
    attack: 10.0       # ms
    release: 100.0     # ms
    makeup_gain: 0.0   # dB
  
  # Master Limiter
  limiter:
    enabled: true
    threshold: -0.5    # dB
    release: 0.1       # seconds


# ----------------------------------------------------------
# SECTION 5: ARPEGGIATOR CONFIGURATION
# ----------------------------------------------------------

arpeggiator:
  enabled: false
  tempo: 120           # BPM
  swing: 0.0           # Swing amount (-1 to 1)
  gate_time: 0.9       # Note gate time (0-1)
  velocity: 100        # Output velocity
  octave_range: 2       # Octave range (1-8)
  
  # Pattern assignments per channel
  channel_patterns:
    channel_0: "up"
    channel_1: "down"
    channel_2: "up_down"
    channel_3: "random"


# ----------------------------------------------------------
# SECTION 6: MPE CONFIGURATION
# ----------------------------------------------------------

mpe:
  enabled: true
  
  # MPE Zones
  zones:
    - zone_id: 1
      enabled: true
      lower_channel: 0
      upper_channel: 7
      pitch_bend_range: 48    # +/-48 semitones
      timbre_cc: 74           # CC for timbre
      pressure_active: true   # Per-note pressure
      slide_active: true      # Slide control
      lift_active: true       # Lift control
  
  # Global MPE settings
  global:
    per_note_pitch: true
    per_note_timbre: true
    per_note_pressure: true


# ----------------------------------------------------------
# SECTION 7: TUNING / MICROTONAL CONFIGURATION
# ----------------------------------------------------------

tuning:
  temperament: "equal"    # equal, just, pythagorean, meantone, etc.
  a4_frequency: 440.0    # A4 reference frequency in Hz
  global_offset: 0.0     # Global tuning offset in cents
  
  # Custom tuning (if temperament is "custom")
  custom_tuning:
    enabled: false
    notes:
      C: 0.0
      C_sharp: 0.0
      D: 0.0
      D_sharp: 0.0
      E: 0.0
      F: 0.0
      F_sharp: 0.0
      G: 0.0
      G_sharp: 0.0
      A: 0.0
      A_sharp: 0.0
      B: 0.0
