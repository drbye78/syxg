# ============================================================
# UNIFIED CONFIGURATION - syxg synthesizer
# ============================================================
# This file contains ALL configuration settings:
# - Runtime/Audio engine settings
# - XGML-style musical configuration (parts, effects, arpeggiator, MPE, tuning)

# ----------------------------------------------------------
# SECTION 1: RUNTIME / AUDIO ENGINE SETTINGS
# ----------------------------------------------------------

# Audio Settings
audio:
  sample_rate: 48000
  bit_depth: 32
  block_size: 1024
  polyphony: 128
  volume: 0.8

# MIDI Settings
midi:
  xg_enabled: true
  gs_enabled: true
  mpe_enabled: true
  device_id: 16

# Engine Priorities (which engine handles which part)
engines:
  default: "sf2"
  priority:
    sf2: 30
    fm: 8
    wavetable: 7
    physical: 5
    spectral: 3

# Voice Management
voices:
  max_polyphony: 128
  stealing_policy: "oldest_first"

# ----------------------------------------------------------
# SECTION 1.5: SOUNDFONT CONFIGURATION (Multiple SoundFonts)
# ----------------------------------------------------------

# Multiple SoundFont files with advanced configuration options
# Each soundfont can have:
# - path: Path to the SF2 file
# - priority: Loading priority (higher = loaded first, used first for conflicts)
# - blacklist: Programs to exclude from this soundfont (bank, program pairs)
# - remap: Program remapping (from_bank:from_program > to_bank:to_program)

# Simple single path (legacy compatibility)
sf2_path: ""

# Multiple soundfonts with full configuration
soundfonts:
  - path: "/mnt/c/work/guga/sf2/ref.sf2"
  # Example 1: Primary soundfont with high priority
  # - path: "/path/to/primary.sf2"
  #   priority: 10
  #   blacklist: []
  #   remap: {}
  
  # Example 2: Secondary soundfont (lower priority, blacklist some programs)
  # - path: "/path/to/secondary.sf2"
  #   priority: 5
  #   blacklist:
  #     - [0, 0]    # bank 0, program 0
  #     - [0, 1]    # bank 0, program 1
  #   remap: {}
  
  # Example 3: Soundfont with program remapping
  # - path: "/path/to/drums.sf2"
  #   priority: 8
  #   blacklist: []
  #   remap:
  #     "0:0": "8:0"   # Remap program 0 on bank 0 to bank 8 (drums)

# ----------------------------------------------------------
# SECTION 2: PER-PART CHANNEL CONFIGURATION
# ----------------------------------------------------------
# Configuration for each of the 16 XG parts (channels 0-15)
# Each part can use different synthesis engines

parts:
  # Part 0 - Default piano (SF2 engine)
  part_0:
    engine: "sf2"
    program: 0
    bank_msb: 0
    bank_lsb: 0
    volume: 127
    pan: 64
    expression: 127
    reverb_send: 40
    chorus_send: 0
    variation_send: 0
    
    # Filter settings
    filter:
      cutoff: 127
      resonance: 0
      envelope:
        attack: 0
        decay: 0
        sustain: 127
        release: 0
        
    # LFO settings
    lfo:
      lfo1:
        waveform: "sine"
        speed: 64
        pitch_depth: 0
        filter_depth: 0
        amplitude_depth: 0
      lfo2:
        waveform: "sine"
        speed: 64
        pitch_depth: 0
        filter_depth: 0
        amplitude_depth: 0

