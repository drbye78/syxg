audio:
  sample_rate: 44100
  chunk_duration_ms: 50
  max_polyphony: 128
  master_volume: 1.0

soundfonts:
  - "sine_test_final_corrected.sf2"

output:
  format: "wav"
  quality: 5

midi:
  default_tempo: 120
  default_velocity: 100

performance:
  use_vectorization: true
  use_threading: false
  buffer_size: 8192
